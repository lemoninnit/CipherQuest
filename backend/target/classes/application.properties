# ==============================
# CipherQuest – Application Config
# ==============================

# Server
server.port=8080

# H2 In-Memory DB (replace with MySQL/PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:cipherquestdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=CipherQuestSuperSecretKey2026ShouldBeAtLeast256BitsLongForHS256Algorithm
jwt.expiration-ms=86400000

# CORS – update origin for production
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Fishing game config
game.fishing.max-attempts=10
game.fishing.base-xp=100
game.fishing.streak-bonus-multiplier=1.5
